<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Item Management</title>
    <style>
        :root {
            --primary: #06b6d4;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg: #020617;
            --card: #0f172a;
            --text: #f1f5f9;
            --border: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .admin-container {
            max-width: 800px;
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 1.25rem; }

        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .item-row:last-child { border-bottom: none; }
        .item-row:hover { background: rgba(0,0,0,0.02); }

        .item-info {
            display: flex;
            flex-direction: column;
        }

        .item-name { font-weight: 600; }
        .item-id { font-size: 0.75rem; color: #64748b; font-family: monospace; }

        .delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            transition: opacity 0.2s, transform 0.1s;
        }

        .delete-btn:hover { opacity: 0.9; }
        .delete-btn:active { transform: scale(0.95); }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateY(100px);
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 1000;
        }

        #toast.show { transform: translateY(0); }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header">
            <h1>User Management</h1>
            <button onclick="resetData()" style="font-size: 0.75rem; cursor: pointer; background: none; border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; color: var(--text)">Reset Demo Data</button>
        </div>
        <ul id="item-list" class="item-list">
            <!-- Items will be injected here -->
        </ul>
    </div>

    <div id="toast">Item deleted successfully!</div>

    <script>
        // 1. Initial Data Simulation
        const initialData = [
            { id: 'usr_1a2b', name: 'Alice Johnson', email: 'alice@example.com' },
            { id: 'usr_3c4d', name: 'Bob Smith', email: 'bob@example.com' },
            { id: 'usr_5e6f', name: 'Charlie Brown', email: 'charlie@example.com' },
            { id: 'usr_7g8h', name: 'Diana Prince', email: 'diana@example.com' }
        ];

        const listContainer = document.getElementById('item-list');
        const toast = document.getElementById('toast');

        // 2. Initialize Data in LocalStorage
        function initStorage() {
            if (!localStorage.getItem('admin_items')) {
                console.log('Initializing localStorage with demo data...');
                localStorage.setItem('admin_items', JSON.stringify(initialData));
            }
        }

        // 3. Render Items to UI
        function render() {
            const items = JSON.parse(localStorage.getItem('admin_items') || '[]');
            console.log('Rendering items:', items.length);

            if (items.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">No users found in database.</div>';
                return;
            }

            listContainer.innerHTML = items.map(item => `
                <li class="item-row" id="row-${item.id}">
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-id">ID: ${item.id}</span>
                    </div>
                    <button 
                        class="delete-btn" 
                        data-id="${item.id}"
                        aria-label="Delete ${item.name}"
                    >
                        Delete
                    </button>
                </li>
            `).join('');
        }

        // 4. Delete Logic
        function deleteItem(id) {
            console.log(`Attempting to delete item with ID: ${id}`);
            
            // a. Confirmation
            if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
                console.log('Deletion cancelled by user.');
                return;
            }

            // b. Update Database (LocalStorage)
            const items = JSON.parse(localStorage.getItem('admin_items') || '[]');
            const updatedItems = items.filter(item => item.id !== id);
            
            if (items.length === updatedItems.length) {
                console.error(`Error: Item with ID ${id} not found in database.`);
                return;
            }

            localStorage.setItem('admin_items', JSON.stringify(updatedItems));
            console.log('Item removed from localStorage.');

            // c. Update UI (DOM Removal)
            const elementToRemove = document.getElementById(`row-${id}`);
            if (elementToRemove) {
                elementToRemove.style.opacity = '0';
                elementToRemove.style.transform = 'translateX(20px)';
                elementToRemove.style.transition = 'all 0.3s ease';
                
                setTimeout(() => {
                    elementToRemove.remove();
                    console.log('Item removed from DOM.');
                    
                    // Check if list is now empty to show empty state
                    if (updatedItems.length === 0) render();
                }, 300);
            }

            // d. Success Feedback
            showToast();
        }

        // 5. Event Delegation (Efficient handling of dynamic elements)
        listContainer.addEventListener('click', (event) => {
            // Check if the clicked element is a delete button
            if (event.target.classList.contains('delete-btn')) {
                const id = event.target.getAttribute('data-id');
                deleteItem(id);
            }
        });

        // 6. Utility Functions
        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function resetData() {
            localStorage.removeItem('admin_items');
            initStorage();
            render();
            console.log('Demo data reset.');
        }

        // Initialize
        initStorage();
        render();

        // System Theme Support
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
